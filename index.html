<style>
  :root{
    --ink:#fff5ea;
    --ink-dim:rgba(255,245,234,.66);
    --ink-faint:rgba(255,245,234,.38);
    --card:rgba(255,245,234,.07);
    --line:rgba(255,245,234,.15);
    --mincho:"Shippori Mincho","Hiragino Mincho ProN",serif;
    --sans:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:#0e0a22;
    min-height:100dvh;
    overflow-x:hidden;
  }

  /* ---- 空（JSが毎秒、連続補間で塗る） ---- */
  .sky{position:fixed;inset:0;z-index:-4}
  canvas#stars{position:fixed;inset:0;z-index:-3;pointer-events:none}
  .sun{
    position:fixed;left:50%;bottom:-30%;z-index:-2;
    width:140px;height:140px;border-radius:50%;
    transform:translate(-50%,50%);
    background:radial-gradient(circle,#fff3cf 0%,#ffcf7e 42%,#ff9e4d 60%,rgba(255,158,77,0) 74%);
    filter:blur(1.5px);
    pointer-events:none;
    animation:sunbreath 9s ease-in-out infinite;
    transition:opacity 2s ease;
  }
  @keyframes sunbreath{
    0%,100%{filter:blur(1.5px) brightness(1)}
    50%{filter:blur(1.5px) brightness(1.14)}
  }
  .moon{
    position:fixed;left:50%;bottom:-30%;z-index:-2;
    width:72px;height:72px;
    transform:translate(-50%,50%);
    opacity:0;transition:opacity 3.5s ease;
    pointer-events:none;
  }
  .moon svg{
    width:100%;height:100%;display:block;overflow:visible;
    animation:moonbreath 11s ease-in-out infinite;
  }
  @keyframes moonbreath{
    0%,100%{filter:brightness(1)}
    50%{filter:brightness(1.12)}
  }
  .glow{
    position:fixed;left:0;right:0;bottom:0;height:34vh;z-index:-2;
    background:linear-gradient(180deg,rgba(255,158,77,0) 0%,var(--glow,rgba(255,158,77,.2)) 100%);
    pointer-events:none;
  }
  .vignette{
    position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 30%,transparent 60%,rgba(0,0,0,.28) 100%);
  }

  .wrap{
    position:relative;
    min-height:100dvh;
    display:flex;flex-direction:column;
    padding:max(28px,env(safe-area-inset-top)) 24px max(28px,env(safe-area-inset-bottom));
    max-width:520px;margin:0 auto;
  }
  .top{display:flex;justify-content:flex-end}
  .place{font-size:11.5px;color:var(--ink-faint);text-align:right;max-width:55%}

  .now{
    margin-top:16px;text-align:center;
    text-shadow:0 1px 14px rgba(0,0,0,.35);
    font-size:14.5px;color:var(--ink-dim);
    letter-spacing:.05em;font-variant-numeric:tabular-nums;
    padding-bottom:15px;border-bottom:1px solid var(--line);
  }
  .now .d{font-family:var(--mincho);color:var(--ink)}
  .now .sep{opacity:.3;margin:0 .6em}
  .now .clk{font-weight:600;color:var(--ink)}
  .sekki{
    margin-top:9px;text-align:center;
    text-shadow:0 1px 12px rgba(0,0,0,.3);
    font-family:var(--mincho);font-size:11.5px;
    letter-spacing:.24em;text-indent:.24em;
    color:var(--ink-faint);
  }
  .sekki b{font-weight:600;color:var(--ink-dim)}
  .wago{
    margin-top:12px;text-align:center;
    text-shadow:0 1px 12px rgba(0,0,0,.3);
    font-family:var(--mincho);color:var(--ink-dim);
    font-size:15px;letter-spacing:.3em;text-indent:.3em;
  }
  .wago .yomi{
    display:block;margin-top:4px;
    font-size:10.5px;letter-spacing:.34em;text-indent:.34em;
    color:var(--ink-faint);
  }
  .wx{
    margin-top:10px;text-align:center;
    font-family:var(--mincho);font-size:12px;letter-spacing:.08em;
    color:var(--ink-faint);min-height:1em;
  }

  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;padding:12px 0}
  .eyebrow{
    font-family:var(--mincho);font-size:14px;color:var(--ink-dim);
    letter-spacing:.14em;margin-bottom:9px;
  }
  .count{
    font-size:clamp(48px,17vw,86px);
    font-weight:650;line-height:.92;letter-spacing:-.02em;
    font-variant-numeric:tabular-nums;
    display:flex;align-items:baseline;gap:.12em;flex-wrap:wrap;
    text-shadow:0 2px 30px rgba(0,0,0,.25);
  }
  .count .u{font-family:var(--mincho);font-size:.3em;font-weight:500;color:var(--ink-dim);letter-spacing:.05em}
  .target{margin-top:12px;font-family:var(--mincho);font-size:16px;color:var(--ink);line-height:1.6}
  .target b{font-weight:700}
  .at{color:var(--ink-dim);font-size:15px}

  .times{display:flex;gap:12px;margin-top:18px}
  .t{
    flex:1;background:rgba(255,245,234,.055);border:1px solid var(--line);
    border-radius:16px;padding:9px 14px 10px;
  }
  .t .lab{font-family:var(--mincho);font-size:11px;color:var(--ink-dim);letter-spacing:.1em;margin-bottom:4px}
  .t .val{font-size:21px;font-weight:700;font-variant-numeric:tabular-nums}
  .t.now-evt{border-color:rgba(255,178,77,.5);box-shadow:0 0 22px rgba(255,158,77,.12),0 0 0 1px rgba(255,178,77,.2) inset}

  .mtimes{
    margin-top:9px;text-align:center;
    font-family:var(--mincho);font-size:12.5px;
    letter-spacing:.1em;color:var(--ink-dim);
    min-height:1em;

  .mtimes .d2{color:var(--ink-faint);font-size:11px;margin:0 .15em}
  .mname{
    margin-top:6px;text-align:center;
    font-family:var(--mincho);font-size:12px;
    letter-spacing:.16em;color:var(--ink-faint);min-height:1em;
  }
  .mname b{font-weight:600;color:var(--ink-dim)}
  .mutter{
    margin-top:12px;
    background:rgba(255,245,234,.055);border:1px solid var(--line);
    border-radius:16px;padding:11px 15px 12px;
    cursor:pointer;
    transition:transform .12s ease;
    user-select:none;
  }
  .mutter:active{transform:scale(.985)}
  .mutter .mlab{font-size:10.5px;color:var(--ink-faint);letter-spacing:.22em;margin-bottom:5px}
  .mutter .mtxt{font-family:var(--mincho);font-size:13.5px;line-height:1.7;color:var(--ink)}
  .mutter .mtap{font-size:10.5px;color:var(--ink-faint);margin-top:6px;text-align:right}

  .actions{margin-top:14px;display:flex;flex-direction:column;gap:9px}
  button{
    font-family:var(--sans);font-size:15px;font-weight:600;color:var(--ink);
    border:1px solid var(--line);background:rgba(255,245,234,.055);
    padding:13px;border-radius:14px;cursor:pointer;
    transition:transform .12s ease,opacity .2s;
  }
  button:active{transform:scale(.98)}
  button.primary{background:rgba(255,178,77,.92);color:#2a160a;border-color:transparent}
  button:disabled{opacity:.5;cursor:default}
  .hint{font-size:12px;color:var(--ink-faint);line-height:1.7;margin-top:2px}
  .hint b{color:var(--ink-dim);font-weight:600}
  .gear{
    display:block;margin:16px auto 0;padding:7px 18px;
    background:none;border:none;backdrop-filter:none;
    font-family:var(--mincho);font-size:11px;letter-spacing:.24em;text-indent:.24em;
    color:rgba(255,245,234,.32);cursor:pointer;
  }
  .panel{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:rgba(16,10,30,.95);border-top:1px solid var(--line);
    border-radius:22px 22px 0 0;
    padding:22px 22px calc(22px + env(safe-area-inset-bottom));
    transform:translateY(105%);transition:transform .35s cubic-bezier(.2,.9,.3,1);
    backdrop-filter:blur(16px);
    max-width:520px;margin:0 auto;
  }
  .panel.show{transform:translateY(0)}
  .panel .ptitle{
    font-family:var(--mincho);font-size:13px;letter-spacing:.26em;text-indent:.26em;
    color:var(--ink-dim);text-align:center;margin-bottom:18px;
  }
  .prow{margin-bottom:16px}
  .prow .plab{font-family:var(--mincho);font-size:12px;color:var(--ink-dim);letter-spacing:.12em;margin-bottom:8px}
  .seg{display:flex;gap:8px}
  .seg button{
    flex:1;padding:10px 4px;font-size:13px;font-weight:500;
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    color:var(--ink-dim);backdrop-filter:none;
  }
  .seg button.on{
    background:rgba(255,178,77,.9);color:#2a160a;border-color:transparent;font-weight:600;
  }
  .pclose{
    display:block;width:100%;margin-top:6px;padding:13px;
    font-size:14px;font-weight:600;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:14px;
  }
  .credit{
    margin-top:26px;text-align:center;
    font-size:10px;letter-spacing:.26em;text-indent:.26em;
    color:rgba(255,245,234,.24);
    user-select:none;
  }

  .toast{
    position:fixed;left:50%;bottom:calc(28px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(140%);
    background:rgba(16,10,30,.93);border:1px solid var(--line);
    color:var(--ink);padding:14px 18px;border-radius:16px;
    max-width:min(440px,88vw);font-size:14.5px;line-height:1.6;
    backdrop-filter:blur(14px);transition:transform .4s cubic-bezier(.2,.9,.3,1);z-index:10;
    box-shadow:0 12px 44px rgba(0,0,0,.45);
    font-family:var(--mincho);
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast .tlab{font-family:var(--sans);font-size:10.5px;color:var(--ink-faint);letter-spacing:.18em;margin-bottom:5px}

  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }
</style>

  </radialGradient></defs>

</svg></div>

<div class="wrap">
  <div class="top">
    <div class="place" id="place">現在地をさがしてる…</div>
  </div>

  <div class="now" id="now">――</div>
  <div class="sekki" id="sekki"></div>
  <div class="wago" id="wago"></div>
  <div class="wx" id="wx"></div>

  <div class="stage">
    <div class="eyebrow" id="eyebrow">つぎは</div>
    <div class="count" id="count">--<span class="u">時間</span> --<span class="u">分</span></div>

      <div class="mtap">タップで別の話</div>
    </div>

    <div class="actions">
      <button class="primary" id="notify">通知をうけとる</button>
      <button id="test">どんな通知が来るか見てみる</button>
      <div class="hint"><b>このアプリを開いている間</b>、日の出と日の入りのころに1通ずつ届くよ。ぴったりの日もあれば、ちょっと早い日も遅い日もある。友達なので。位置情報を許可すると、その場所の太陽と天気で動きます。天気データ: Open-Meteo</div>
    </div>

    <button class="gear" id="gear">空 の 調 整</button>
    <div class="credit">Presented by Twycle</div>
  </div>
</div>

<div class="panel" id="panel">
  <div class="ptitle">空 の 調 整</div>
  <div class="prow"><div class="plab">ひかり（残光・月・星）</div>
    <div class="seg">
      <button data-k="light" data-v="0.6">ひかえめ</button>
      <button data-k="light" data-v="1">ふつう</button>
      <button data-k="light" data-v="1.35">つよめ</button>
    </div></div>
  <button class="pclose" id="pclose">とじる</button>
</div>

<div class="toast" id="toast"><div class="tlab" id="toast-lab">たいよう より</div><div id="toast-body"></div></div>

<script>
/* ================= 日の出・日の入り計算（SunCalcアルゴリズム / NOAAベース） ================= */
const SC=(()=>{
  const PI=Math.PI, rad=PI/180, dayMs=864e5, J1970=2440588, J2000=2451545;
  const e=rad*23.4397;
  const toJulian=d=>d.valueOf()/dayMs-0.5+J1970;
  const fromJulian=j=>new Date((j+0.5-J1970)*dayMs);
  const toDays=d=>toJulian(d)-J2000;
  const solarMeanAnomaly=d=>rad*(357.5291+0.98560028*d);
  const eclipticLongitude=M=>{
    const C=rad*(1.9148*Math.sin(M)+0.02*Math.sin(2*M)+0.0003*Math.sin(3*M));
    return M+C+rad*102.9372+PI;
  };
  const declination=(l,b)=>Math.asin(Math.sin(b)*Math.cos(e)+Math.cos(b)*Math.sin(e)*Math.sin(l));
  const rightAscension=(l,b)=>Math.atan2(Math.sin(l)*Math.cos(e)-Math.tan(b)*Math.sin(e),Math.cos(l));
  const J0=0.0009;
  const approxTransit=(Ht,lw,n)=>J0+(Ht+lw)/(2*PI)+n;
  const solarTransitJ=(ds,M,L)=>J2000+ds+0.0053*Math.sin(M)-0.0069*Math.sin(2*L);
  const hourAngle=(h,phi,d)=>Math.acos((Math.sin(h)-Math.sin(phi)*Math.sin(d))/(Math.cos(phi)*Math.cos(d)));

  /* 太陽の赤道座標（月の照度計算に使う） */
  const sunCoords=d=>{
    const M=solarMeanAnomaly(d), L=eclipticLongitude(M);
    return {dec:declination(L,0), ra:rightAscension(L,0)};
  };
  /* 月の赤道座標と地心距離（SunCalcの簡略軌道モデル） */
  const moonCoords=d=>{
    const L=rad*(218.316+13.176396*d),
          M=rad*(134.963+13.064993*d),
          F=rad*(93.272+13.229350*d);
    const l=L+rad*6.289*Math.sin(M),
          b=rad*5.128*Math.sin(F),
          dt=385001-20905*Math.cos(M);
    return {ra:rightAscension(l,b), dec:declination(l,b), dist:dt};
  };
  /* 月の照度と位相：fraction(0-1)=満ち欠け, phase(0=新月,0.5=満月) */
  const moonIllumination=date=>{
    const d=toDays(date||new Date());
    const s=sunCoords(d), m=moonCoords(d), sdist=149598000;
    const phi=Math.acos(Math.sin(s.dec)*Math.sin(m.dec)+Math.cos(s.dec)*Math.cos(m.dec)*Math.cos(s.ra-m.ra));
    const inc=Math.atan2(sdist*Math.sin(phi),m.dist-sdist*Math.cos(phi));
    const angle=Math.atan2(Math.cos(s.dec)*Math.sin(s.ra-m.ra),
                Math.sin(s.dec)*Math.cos(m.dec)-Math.cos(s.dec)*Math.sin(m.dec)*Math.cos(s.ra-m.ra));
    return {fraction:(1+Math.cos(inc))/2, phase:0.5+0.5*inc*(angle<0?-1:1)/PI, angle};
  };

  const times=function(date,lat,lng){
    const lw=rad*-lng, phi=rad*lat, d=toDays(date);
    const n=Math.round(d-J0-lw/(2*PI));
    const ds=approxTransit(0,lw,n);
    const M=solarMeanAnomaly(ds), L=eclipticLongitude(M), dec=declination(L,0);
    const Jnoon=solarTransitJ(ds,M,L);
    const h0=-0.833*rad;
    const w=hourAngle(h0,phi,dec), a=approxTransit(w,lw,n);
    const Jset=solarTransitJ(a,M,L);
    const Jrise=Jnoon-(Jset-Jnoon);
    return {sunrise:fromJulian(Jrise), sunset:fromJulian(Jset)};
  };
  times.moonIllumination=moonIllumination;
  /* 月の高度（ラジアン）: 月の出・月の入りの判定用 */
  times.moonAltitude=(date,latV,lngV)=>{
    const lw=rad*-lngV, phi=rad*latV, d=toDays(date);
    const c=moonCoords(d);
    const H=rad*(280.16+360.9856235*d)-lw-c.ra;   // 恒星時 - 赤経 = 時角
    return Math.asin(Math.sin(phi)*Math.sin(c.dec)+Math.cos(phi)*Math.cos(c.dec)*Math.cos(H));
  };
  /* 太陽黄経（度）: 二十四節気の判定用。春分=0度。
     USNO Astronomical Almanacの低精度式（精度±0.01度≒±15分）。
     日の出計算の式は近日点を固定していて節気判定には精度不足のため、別式を使う */
  times.solarLongitude=date=>{
    const d=toDays(date||new Date());
    const g=rad*(357.528+0.9856003*d);
    const lam=280.460+0.9856474*d+1.915*Math.sin(g)+0.020*Math.sin(2*g);
    return ((lam%360)+360)%360;
  };
  return times;
})();

/* ================= 通知文面 ================= */
/* 通常（晴れ・薄曇り） */
const LINES={
  rise:[
    n=>`おはよう。あと${n}分で日が昇るよ。ゆっくりでいいからね (´ー｀)`,
    n=>`ごめんね、ちょっと早いけど…あと${n}分で日の出だよ ☀`,
    n=>`太陽、そろそろ出てくるって。あと${n}分。急がなくて大丈夫`,
    n=>`夜が終わるよ。あと${n}分。今日もぼちぼちいこう (˘ω˘)`,
    n=>`まだ眠い？あと${n}分で日の出。二度寝も、ありだよ`,
    n=>`あと${n}分で朝が来るよ。カーテン、ちょっとだけ開けてみて`,
    n=>`東の空、あと${n}分で明るくなるよ。深呼吸にちょうどいい時間`,
    n=>`太陽「いまから行くね」って。あと${n}分だそうです ☺︎`
  ],
  set:[
    n=>`太陽、そろそろ帰るって。あと${n}分。今日もよくがんばったね`,
    n=>`あと${n}分で、今日がゆっくり傾くよ (´ー｀)`,

  if(N>=R-90*60000 && N<R+3*3600000) return "morning";
  if(N>=R+3*3600000 && N<S-2*3600000) return "day";
  if(N>=S-2*3600000 && N<S+60*60000) return "evening";
  return "night";
}

      `雨の日は、空が地上まで降りてきてる日。って思うと、ちょっと得した気分にならない？`,
      `雨音は「集中できる環境音」として売られてます。今日は無料で聴き放題。`);
    if(wx.cls==="snow") base.push(`雪の日は音が吸われて静かになる。世界のボリュームが下がる日です。`);
    if(wx.cls==="clear") base.push(`今日は空が晴れてる。夕方、ちょっとだけ西を見る予定、入れておかない？`);
    if(wx.cls==="fog") base.push(`霧は「地上に降りた雲」。つまり今日、君は雲の中を歩けます。`);
  }
  return base;
}

function classifyWeather(code,cloud){
  if([95,96,99].includes(code)) return "rain";      // 雷雨は雨扱い
  if((code>=71&&code<=77)||code===85||code===86) return "snow";
  if((code>=51&&code<=67)||(code>=80&&code<=82)) return "rain";
  if(code===45||code===48) return "fog";
  if(cloud>=75) return "cloudy";
  if(cloud>=35) return "partly";
  return "clear";
}
const WX_LABEL={clear:"☀ はれ",partly:"⛅ うすぐもり",cloudy:"☁ くもり",rain:"☔ あめ",snow:"❄ ゆき",fog:"🌫 きり"};
async function fetchWeather(){
  try{
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code,cloud_cover&timezone=auto`;
    const r=await fetch(u);
    if(!r.ok) throw 0;
    const j=await r.json();

    wx={ok:true, cls:classifyWeather(c.weather_code,c.cloud_cover), temp:Math.round(c.temperature_2m), cloud:c.cloud_cover};
    $("wx").textContent=`${WX_LABEL[wx.cls]} ・ ${wx.temp}℃`;

}

/* ================= 空：連続補間 ================= */
const hex2rgb=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
const mixRGB=(A,B,t)=>[0,1,2].map(i=>Math.round(A[i]+(B[i]-A[i])*t));
const rgbStr=c=>`rgb(${c[0]},${c[1]},${c[2]})`;
const PAL={
  night:     {c:["#05040f","#0d0a22","#181233","#241a3f"], sun:-14, star:1,   glow:.04},
  astroDawn: {c:["#0a0726","#181040","#2e1e52","#46285c"], sun:-8,  star:.75, glow:.08},
  civilDawn: {c:["#181242","#3e2662","#7a3e66","#c86e50"], sun:-3,  star:.3,  glow:.22},
  sunrise:   {c:["#28205c","#5e366c","#bd6656","#ffab60"], sun:4,   star:0,   glow:.4},
  mornGold:  {c:["#3a5a92","#7a86ae","#d9a47c","#ffd9a0"], sun:22,  star:0,   glow:.25},
  day:       {c:["#2e6fb0","#5b97cf","#9cc4e6","#ffe7b8"], sun:64,  star:0,   glow:.08},
  golden:    {c:["#3f5694","#8a6890","#e0885e","#ffc576"], sun:24,  star:0,   glow:.3},
  preSet:    {c:["#2c1e56","#663366","#c85a48","#ff9448"], sun:8,   star:0,   glow:.42},
  sunset:    {c:["#221a4c","#5a3064","#c25242","#ff8a3d"], sun:3,   star:0,   glow:.5},
  civilDusk: {c:["#150f3c","#372054","#6e3658","#c46448"], sun:-3,  star:.35, glow:.26},
  astroDusk: {c:["#0a0726","#170f38","#2c1b48","#452a52"], sun:-8,  star:.75, glow:.1}
};
/* 天気による空の鈍り：色をグレーへ寄せる係数と、寄せ先 */
const WX_MUTE={clear:{k:0,g:[107,114,128]},partly:{k:.22,g:[110,117,130]},cloudy:{k:.52,g:[104,110,122]},
               fog:{k:.6,g:[128,132,140]},rain:{k:.58,g:[70,76,88]},snow:{k:.45,g:[150,155,165]}};
function skyKeyframes(){
  const m=d=>d.getHours()*60+d.getMinutes()+d.getSeconds()/60;
  const R=m(times.sunrise), S=m(times.sunset);
  return [
    {t:R-90, p:PAL.night},
    {t:R-45, p:PAL.astroDawn},
    {t:R-18, p:PAL.civilDawn},
    {t:R,    p:PAL.sunrise},
    {t:R+50, p:PAL.mornGold},
    {t:(R+S)/2, p:PAL.day},
    {t:S-75, p:PAL.golden},
    {t:S-22, p:PAL.preSet},
    {t:S,    p:PAL.sunset},
    {t:S+18, p:PAL.civilDusk},
    {t:S+45, p:PAL.astroDusk},
    {t:S+90, p:PAL.night}
  ];
}
let starAlpha=0;
function paintSky(){
  const now=new Date();
  const nowM=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  const kf=skyKeyframes();
  let a=PAL.night,b=PAL.night,t=0;
  if(!(nowM<=kf[0].t||nowM>=kf[kf.length-1].t)){
    for(let i=0;i<kf.length-1;i++){
      if(nowM>=kf[i].t&&nowM<=kf[i+1].t){
        a=kf[i].p;b=kf[i+1].p;
        t=(nowM-kf[i].t)/(kf[i+1].t-kf[i].t);break;
      }
    }
  }
  const mute=wx.ok?(WX_MUTE[wx.cls]||WX_MUTE.clear):WX_MUTE.clear;
  const c=[0,1,2,3].map(i=>{
    let col=mixRGB(hex2rgb(a.c[i]),hex2rgb(b.c[i]),t);
    col=mixRGB(col,mute.g,mute.k);           // 天気で鈍らせる
    return rgbStr(col);
  });
  $("sky").style.background=
    `linear-gradient(180deg,${c[0]} 0%,${c[1]} 46%,${c[2]} 76%,${c[3]} 100%)`;
  /* ---- 太陽の弧: 左から昇り、南中で頂点・最大、右へ沈む ---- */
  const mm=d=>d.getHours()*60+d.getMinutes()+d.getSeconds()/60;
  const Rm=mm(times.sunrise), Sm=mm(times.sunset);
  const sp=(nowM-Rm)/(Sm-Rm);                       // 0=日の出, 1=日の入り
  const arcY=Math.sin(Math.PI*Math.min(Math.max(sp,-0.12),1.12));
  const sunEl=$("sun");
  sunEl.style.left=Math.min(96,Math.max(4,8+84*sp))+"%";
  sunEl.style.bottom=(5+81*arcY)+"%";
  sunEl.style.transform=`translate(-50%,50%) scale(${(0.62+0.55*Math.max(0,arcY)).toFixed(3)})`;
  sunEl.style.opacity=(arcY<-0.1?0:1)*(1-mute.k*.85); // 沈みきったら消え、曇りはかすむ
  const glow=(a.glow+(b.glow-a.glow)*t)*(1-mute.k)*prefs.light;
  $("glow").style.setProperty("--glow",`rgba(255,148,72,${glow})`);
  starAlpha=Math.min(1,(a.star+(b.star-a.star)*t)*(1-mute.k*.95)*prefs.light);   // 雲が厚いと星は見えない
  /* ---- 月の弧: 本物の月の出〜月の入りに同期 ---- */
  const nightGate = starAlpha>0.22 ? Math.min(1,(starAlpha-0.22)/0.5)*.95 : 0;
  const ma=moonArcNow();
  const moonEl=$("moon");
  if(ma.up && nightGate>0){
    const mp=(Date.now()-ma.rise)/(ma.set-ma.rise);   // 0=月の出, 1=月の入り
    const mArcY=Math.sin(Math.PI*Math.min(Math.max(mp,0),1));
    moonEl.style.left=Math.min(96,Math.max(4,8+84*mp))+"%";
    moonEl.style.bottom=(11+72*mArcY)+"%";
    moonEl.style.transform=`translate(-50%,50%) scale(${(0.7+0.45*mArcY).toFixed(3)})`;
    moonEl.style.opacity=nightGate*(1-mute.k*.8)*Math.min(1,prefs.light+0.05);
    renderMoon();
  }else{
    moonEl.style.opacity=0;                            // 月が空にいない夜は、星だけ
  }
  document.body.style.background=c[0];
  return nowM;
}

/* 次の月の出・月の入り時刻（表示用・二分法で1分精度・10分キャッシュ） */
let moonTimesCache={calc:0,rise:null,set:null};
function nextMoonTimes(){
  const t0=Date.now();
  if(t0-moonTimesCache.calc<600000) return moonTimesCache;
  const hc=0.133*Math.PI/180;   // 出没の見かけ高度補正（大気差+視半径-視差の慣用値）
  const alt=t=>SC.moonAltitude(new Date(t),lat,lng)-hc;
  function nextCross(up){
    let prev=alt(t0);
    for(let t=t0+300000;t<=t0+27*3600000;t+=300000){
      const a=alt(t);
      if(up?(prev<=0&&a>0):(prev>=0&&a<0)){
        let lo=t-300000,hi=t;
        for(let i=0;i<9;i++){const mid=(lo+hi)/2;((alt(mid)>0)===up)?hi=mid:lo=mid;}
        return new Date((lo+hi)/2);
      }
      prev=a;
    }
    return null;
  }
  moonTimesCache={calc:t0,rise:nextCross(true),set:nextCross(false)};
  return moonTimesCache;
}

/* 月の出・月の入り: 今月が昇っていれば、その区間を高度計算で探す（10分キャッシュ） */
let moonArcCache={calc:0,up:false};
function moonArcNow(){
  const t0=Date.now();
  if(t0-moonArcCache.calc<600000) return moonArcCache;
  const alt=SC.moonAltitude(new Date(t0),lat,lng);
  if(alt<=0){ moonArcCache={calc:t0,up:false}; return moonArcCache; }
  let r=t0,s=t0,guard=0;
  while(SC.moonAltitude(new Date(r-300000),lat,lng)>0 && guard++<320) r-=300000;
  guard=0;
  while(SC.moonAltitude(new Date(s+300000),lat,lng)>0 && guard++<320) s+=300000;
  moonArcCache={calc:t0,up:true,rise:r-150000,set:s+150000};
  return moonArcCache;
}

/* ================= 月の満ち欠け ================= */
let lastMoonKey="";
function renderMoon(){
  const ill=SC.moonIllumination(new Date());
  const f=ill.fraction;                       // 0=新月, 1=満月
  const waxing=ill.phase<0.5;                 // 満ちていく途中か
  // 1日1回だけ描き直せば十分（負荷軽減）
  const key=new Date().toDateString()+"|"+prefs.light;
  if(key===lastMoonKey) return;
  lastMoonKey=key;

  const r=48, cx=50, cy=50;
  let brightRight=waxing;                      // 北半球：満ちる月は右が光る
  if(lat<0) brightRight=!brightRight;          // 南半球は左右反転
  const crescent=f<0.5;                        // 三日月期（欠けが半分超）
  const rx=r*Math.abs(1-2*f);                  // 明暗境界の楕円の横半径
  const dark="#222a44";                        // 地球照っぽい暗い側

  let s=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${dark}"/>`;
  // 光る半円（右 or 左）
  const sweep=brightRight?1:0;
  s+=`<path d="M ${cx} ${cy-r} A ${r} ${r} 0 0 ${sweep} ${cx} ${cy+r} Z" fill="url(#mg)"/>`;
  // 明暗境界の楕円：三日月期は暗色でえぐり、上弦〜満月期は明色で張り出す
  if(rx>0.4){
    s+=`<ellipse cx="${cx}" cy="${cy}" rx="${rx.toFixed(2)}" ry="${r}" fill="${crescent?dark:'url(#mg)'}"/>`;
  }
  // クレーター（明るい部分にだけ薄く）
  s+=`<g fill="#000" opacity="0.06">
    <circle cx="40" cy="38" r="7"/><circle cx="60" cy="56" r="5"/><circle cx="46" cy="66" r="4"/></g>`;
  document.getElementById("moon-g").innerHTML=s;

  // 明るいほど強く光らせる
  $("moon").style.filter=`drop-shadow(0 0 ${((14+f*26)*prefs.light).toFixed(0)}px rgba(255,250,228,${Math.min(.75,(0.18+f*0.4)*prefs.light).toFixed(2)}))`;
}

/* ================= 伝統時称（日の出R・日の入りS基準／出典: 暦生活+国立天文台の薄明区分） ================= */
function wagoNow(){
  const mm=d=>d.getHours()*60+d.getMinutes()+d.getSeconds()/60;
  const nowM=mm(new Date());
  const R=mm(times.sunrise), S=mm(times.sunset);
  const noon=(R+S)/2;                       // 南中（真昼の中心）
  const M=(noon+720)%1440;                  // 太陽正子（真夜中の中心）
  const wrap=x=>(x%1440+1440)%1440;
  const inR=(x,a,b)=>{a=wrap(a);b=wrap(b);return a<=b?(x>=a&&x<b):(x>=a||x<b);};
  /* 丑三つ時だけは伝統通り時計固定（午前2時〜2時半） */
  if(nowM>=120&&nowM<150) return ["丑三つ時","うしみつどき"];
  const r=nowM-R, s=nowM-S;
  if(r>=-90&&r<-60) return ["暁","あかつき"];          // 天文薄明
  if(r>=-60&&r<-35) return ["東雲","しののめ"];        // 航海薄明
  if(r>=-35&&r<-15) return ["彼は誰時","かわたれどき"];  // 市民薄明
  if(r>=-15&&r<0)   return ["朝ぼらけ","あさぼらけ"];
  if(nowM>=R&&nowM<noon-120)     return ["朝","あさ"];
  if(nowM>=noon-120&&nowM<noon-45) return ["昼","ひる"];
  if(nowM>=noon-45&&nowM<noon+45)return ["真昼","まひる"];
  if(nowM>=noon+45&&nowM<S-150)  return ["昼下がり","ひるさがり"];
  if(nowM>=S-150&&nowM<S-40)     return ["夕方","ゆうがた"];
  if(nowM>=S-40&&nowM<S)         return ["日暮れ","ひぐれ"];
  if(s>=0&&s<25)   return ["黄昏時","たそがれどき"];    // 市民薄明
  if(s>=25&&s<54)  return ["夕闇","ゆうやみ"];          // 航海薄明
  if(s>=54&&s<84)  return ["宵の口","よいのくち"];      // 天文薄明
  if(inR(nowM,S+84,M-150)) return ["宵","よい"];
  if(inR(nowM,M-150,M-60)) return ["夜更け","よふけ"];
  if(inR(nowM,M-60,M+60))  return ["真夜中","まよなか"];
  if(inR(nowM,M+60,R-90))  return ["未明","みめい"];
  return ["夜","よる"];                      // 高緯度などで区分が崩れた時の保険
}

/* ================= 星と雨と雪（同じキャンバスで描く） ================= */
const cv=$("stars"),ctx=cv.getContext("2d");
let stars=[];
function initSkyParticles(){
  cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;
  stars=Array.from({length:130},()=>({
    x:Math.random(),y:Math.random()*0.75,
    r:(Math.random()*1.1+0.4)*devicePixelRatio,
    ph:Math.random()*Math.PI*2, sp:Math.random()*0.9+0.3
  }));
}
addEventListener("resize",initSkyParticles);
function drawSkyParticles(ts){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(starAlpha>0.02){
    for(const s of stars){
      const tw=0.55+0.45*Math.sin(ts/1000*s.sp+s.ph);
      ctx.globalAlpha=starAlpha*tw*.9;
      ctx.fillStyle="#fff5ea";
      ctx.beginPath();
      ctx.arc(s.x*cv.width,s.y*cv.height,s.r,0,Math.PI*2);
      ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(drawSkyParticles);
}

/* ================= 表示更新 ================= */
function nextEvent(){
  const now=new Date();
  const today=SC(now,lat,lng);
  let list=[
    {type:"rise",at:today.sunrise},
    {type:"set", at:today.sunset}
  ].filter(x=>x.at>now);
  if(!list.length){
    const t2=SC(new Date(now.getTime()+864e5),lat,lng);
    list=[{type:"rise",at:t2.sunrise},{type:"set",at:t2.sunset}];
  }
  list.sort((a,b)=>a.at-b.at);
  return {next:list[0], today};
}

  const dayLab=d=>d&&d.getDate()!==N.getDate()?'<span class="d2">あす</span>':'';
  $("mtimes").innerHTML='☾ 月の出 '+(mt.rise?dayLab(mt.rise)+fmt(mt.rise):'—')
    +'<span class="d2">・</span>月の入り '+(mt.set?dayLab(mt.set)+fmt(mt.set):'—');
  // 伝統時称の表示（変わった時だけ書き換え）
  const wg=wagoNow();
  if(wg[0]!==lastWago){
    lastWago=wg[0];
    $("wago").innerHTML=wg[0]+'<span class="yomi">'+wg[1]+'</span>';
  }
  // 1時間ごとに、どうでもいい話が変わる
  const hk=N.toDateString()+"|"+N.getHours();
  if(hk!==mutterHourKey){
    mutterHourKey=hk;
    setMutter(false);
    const sk=sekkiNow();
    $("sekki").innerHTML='二十四節気 <b>'+sk[0]+'</b>（'+sk[1]+'）';
    const mn=moonName();
    $("mname").innerHTML='こよみの月 <b>'+mn[0]+'</b>（'+mn[1]+'）';
  }
  scheduleNotifications();
}

/* ================= どうでもいい話：表示制御 ================= */
let mutterHourKey="";
function setMutter(shuffle){
  mutters=buildMutters();                       // 時間帯・天気に合わせて作り直す
  if(shuffle){
    let n; do{ n=Math.floor(Math.random()*mutters.length); }while(n===mutterIdx&&mutters.length>1);
    mutterIdx=n;
  }else{
    // 1時間ごとに変わる（日付+時刻で決まるので、同じ時間でも日が違えば別の話）
    const d=new Date();
    // 日付+時刻をハッシュして選ぶ（プール数と周期が噛み合って毎日同じ話になる事故を防ぐ）
    let x=(d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate())*100+d.getHours();
    x=(x^61)^(x>>>16); x=(x+(x<<3))|0; x=x^(x>>>4); x=Math.imul(x,0x27d4eb2d); x=x^(x>>>15);
    const nIdx=(x>>>0)%mutters.length;
    mutterIdx=(nIdx===mutterIdx&&mutters.length>1)?(nIdx+1)%mutters.length:nIdx;
  }
  $("mutter-txt").textContent=mutters[mutterIdx];
}
$("mutter").addEventListener("click",()=>setMutter(true));

/* ================= 通知 ================= */
function showToast(body){
  $("toast-body").textContent=body;
  const t=$("toast");t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),5600);
}
/* 天気があれば天気の文面、なければ通常。プールが無ければ通常にフォールバック */
function linePool(kind){
  if(wx.ok && W_LINES[wx.cls] && W_LINES[wx.cls][kind] && Math.random()<0.75){
    return W_LINES[wx.cls][kind];
  }
  return LINES[kind];
}
function fire(kind,line,ev){
  const isRise=kind.startsWith("rise");
  const title = isRise ? "☀ たいよう" : "☾ たいよう";
  const body = ev ? line+"\n（きょうの"+(isRise?"日の出":"日の入り")+" "+fmt(ev)+"）" : line;
  if(window.Notification && Notification.permission==="granted"){
    try{ new Notification(title,{body:body,tag:"twycle-"+kind,renotify:true,icon:document.querySelector('link[rel=apple-touch-icon]').href}); }
    catch(e){}
  }
  showToast(body);
}
/*
  ずれガード付き発火:
  予約時刻に起こされたら「今、実際にイベントとどういう位置関係か」を測り直して
  ふさわしい文面を選ぶ。イベントから離れすぎていたら黙って何も出さない。
  許容窓: イベント前60分 〜 日の出後25分 / 日の入り後30分（薄明の内側）
*/
function firePlanned(type){ // type: "rise" | "set"
  const now=new Date();
  const ev = type==="rise" ? times.sunrise : times.sunset;
  const diffMin=(now-ev)/60000; // 負=前, 正=後
  const afterLimit = type==="rise" ? 25 : 30;
  if(diffMin<-60 || diffMin>afterLimit) return;            // 窓の外 → 出さない
  if(diffMin<-2){
    const n=Math.max(1,Math.round(-diffMin));
    fire(type, pick(linePool(type))(n), ev);                // 予告
  }else if(diffMin<=3){
    fire(type+"Now", pick(linePool(type+"Now")), ev);       // その瞬間
  }else{
    fire(type+"After", pick(linePool(type+"After")), ev);   // 残照・朝の金色
  }
}
function scheduleNotifications(){
  const perm=(window.Notification&&Notification.permission)||"none";
  const key=times.sunrise.toDateString()+"|"+perm;
  if(key===scheduledKey) return;                            // 毎秒の再予約はしない
  scheduledKey=key;
  scheduled.forEach(clearTimeout);scheduled=[];
  if(perm!=="granted") return;
  const now=new Date();
  /*
    各イベント1通だけ。時刻は毎日ゆらぐ:
    30%はぴったり、70%は前後15分以内のどこか
    （日の出の後ろ側だけ+12分まで＝日が昇りきらないうちに）
  */
  const wobble=(afterMax)=>{
    if(Math.random()<0.3) return 0;
    const min=-15, max=afterMax;
    return Math.round(min+Math.random()*(max-min));
  };
  const plan=[
    ["rise", new Date(times.sunrise.getTime()+wobble(12)*60000)],
    ["set",  new Date(times.sunset.getTime()+wobble(15)*60000)]
  ];
  for(const [type,at] of plan){
    const ms=at-now;
    if(ms>0) scheduled.push(setTimeout(()=>firePlanned(type),ms));
  }
}
$("notify").addEventListener("click",async()=>{
  if(!("Notification" in window)){ showToast("この端末、通知に対応してないみたい。空は見られるから許して"); return; }
  const perm=await Notification.requestPermission();
  scheduledKey="";
  if(perm==="granted"){
    $("notify").textContent="通知ON。太陽が知らせてくれるよ";
    $("notify").disabled=true;
    showToast("ありがとう。薄明の時間になったら、そっと知らせるね (´ー｀)");
    scheduleNotifications();
  }else{
    showToast("通知はOFFのまま。大丈夫、空は勝手にきれいになるから ☺︎");
  }
});
$("test").addEventListener("click",()=>{
  const {next}=nextEvent();
  const min=Math.max(1,Math.round((next.at-new Date())/60000));
  const pool=linePool(next.type);
  fire(next.type, pick(pool)(Math.min(min,15)), next.at);
});

/* ================= 空の調整パネル ================= */
const qsa=(el,s)=>(el&&el.querySelectorAll)?el.querySelectorAll(s):[];
function refreshPanel(){
  qsa($("panel"),"button[data-k]").forEach(b=>{
    b.classList.toggle("on",prefs[b.dataset.k]===parseFloat(b.dataset.v));
  });
}
$("gear").addEventListener("click",()=>{refreshPanel();$("panel").classList.add("show");});
$("pclose").addEventListener("click",()=>{$("panel").classList.remove("show");});
$("panel").addEventListener("click",e=>{
  const b=e.target&&e.target.closest?e.target.closest("button[data-k]"):null;
  if(!b) return;
  prefs[b.dataset.k]=parseFloat(b.dataset.v);
  savePrefs(); refreshPanel();
});

/* ================= 起動 ================= */
function start(){
  initSkyParticles();
  requestAnimationFrame(drawSkyParticles);
  render();
  setMutter(false);
  setInterval(render,1000);
  fetchWeather();
  setInterval(fetchWeather,30*60000); // 30分ごとに天気更新
}
$("place").textContent="現在地をさがしてる…";
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos=>{
      lat=pos.coords.latitude; lng=pos.coords.longitude;
      moonArcCache={calc:0,up:false};
      moonTimesCache={calc:0,rise:null,set:null};
      $("place").textContent=`緯度 ${lat.toFixed(2)} ／ 経度 ${lng.toFixed(2)}`;
      start();
    },
    err=>{ $("place").textContent="東京の空で計算中"; start(); },
    {timeout:8000, maximumAge:600000}
  );
}else{ $("place").textContent="東京の空で計算中"; start(); }

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
